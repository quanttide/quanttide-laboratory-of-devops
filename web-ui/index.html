<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KSE — Git Submodule Editor</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>KSE</h1>
      <div class="repo-bar">
        <input id="repo-path" type="text" value="." placeholder="仓库路径" />
        <button onclick="scan()">刷新</button>
      </div>
    </header>
    <div class="layout">
      <aside>
        <h3>概览</h3>
        <div id="summary">
          <p>子模块总数: <span id="stat-total">-</span></p>
          <p>干净: <span id="stat-clean" class="status-clean">-</span></p>
          <p>需要关注: <span id="stat-attention" class="status-dirty">-</span></p>
          <div id="aggregate-detail"></div>
        </div>
        <hr />
        <h3>同步操作</h3>
        <div id="batch-actions">
          <button onclick="batchSync()">全部同步到父仓库</button>
        </div>
        <hr />
        <h3>导出 CI</h3>
        <button onclick="exportCI('shell')">Shell 脚本</button>
        <button onclick="exportCI('github')">GitHub Actions</button>
        <button onclick="exportCI('gitlab')">GitLab CI</button>
        <hr />
        <h3>操作提示</h3>
        <div id="messages"></div>
        <hr />
        <h3>操作历史</h3>
        <div style="display:flex;gap:4px;margin-bottom:6px">
          <input id="hist-start" type="date" style="flex:1;font-size:11px;padding:2px 4px" onchange="loadHistory()" />
          <input id="hist-end" type="date" style="flex:1;font-size:11px;padding:2px 4px" onchange="loadHistory()" />
        </div>
        <div id="history-list"></div>
      </aside>
      <main>
        <div id="issues"></div>
        <div id="progress" class="progress-bar" style="display:none"></div>
        <table id="submodules-table">
          <thead>
            <tr>
              <th style="width:32px"><input type="checkbox" id="select-all" onchange="toggleSelectAll()" /></th>
              <th>名称</th>
              <th>状态</th>
              <th>分支</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="submodules-body">
            <tr><td colspan="5" class="empty">点击刷新加载子模块列表</td></tr>
          </tbody>
        </table>
        <div id="detail"></div>
      </main>
    </div>
  </div>
  <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3 id="modal-title">预览</h3>
      <pre id="modal-body"></pre>
      <div class="modal-actions">
        <button onclick="closeModal()">取消</button>
        <button id="modal-confirm" class="btn-primary" onclick="closeModal()">确认执行</button>
      </div>
    </div>
  </div>
  <script src="src/app.js"></script>
</body>
</html>
